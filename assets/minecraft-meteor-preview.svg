<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Minecraft Meteor Mod preview</title>
  <desc id="desc">Dark blocky landscape with a bright meteor trail and impact glow.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.56" stop-color="#172036"/>
      <stop offset="1" stop-color="#2c1623"/>
    </linearGradient>
    <linearGradient id="meteor" x1="0" x2="1">
      <stop offset="0" stop-color="#ffef9f" stop-opacity="0"/>
      <stop offset="0.45" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#ff755f"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#sky)"/>
  <path d="M155 135 L735 330" stroke="url(#meteor)" stroke-width="42" stroke-linecap="round" opacity="0.9"/>
  <path d="M235 190 L760 350" stroke="#fff7c7" stroke-width="10" stroke-linecap="round" opacity="0.78"/>
  <circle cx="790" cy="360" r="54" fill="#ff755f" filter="url(#glow)"/>
  <circle cx="790" cy="360" r="26" fill="#fff1a8"/>
  <g opacity="0.95">
    <rect x="0" y="456" width="1200" height="174" fill="#111827"/>
    <rect x="0" y="424" width="96" height="48" fill="#213b27"/>
    <rect x="96" y="440" width="96" height="32" fill="#2e4b32"/>
    <rect x="192" y="408" width="96" height="64" fill="#223c27"/>
    <rect x="288" y="424" width="96" height="48" fill="#2c4930"/>
    <rect x="384" y="392" width="96" height="80" fill="#203625"/>
    <rect x="480" y="424" width="96" height="48" fill="#2f4d34"/>
    <rect x="576" y="440" width="96" height="32" fill="#263f2c"/>
    <rect x="672" y="408" width="96" height="64" fill="#203625"/>
    <rect x="768" y="392" width="96" height="80" fill="#5b342a"/>
    <rect x="864" y="424" width="96" height="48" fill="#2a402d"/>
    <rect x="960" y="440" width="96" height="32" fill="#243a2a"/>
    <rect x="1056" y="408" width="144" height="64" fill="#2f4d34"/>
  </g>
  <ellipse cx="792" cy="474" rx="176" ry="40" fill="#ff755f" opacity="0.24"/>
  <ellipse cx="792" cy="474" rx="98" ry="20" fill="#fbbf24" opacity="0.42"/>
  <g fill="#d8faff" font-family="Inter, Segoe UI, sans-serif">
    <text x="64" y="86" font-size="40" font-weight="800">Minecraft Meteor Mod</text>
    <text x="64" y="132" font-size="22" fill="#a7b4c7">Forge 1.21 · server/world events · particles · impact effects</text>
  </g>
</svg>
